[program:dataspark]
command=/opt/dataspark/venv/bin/streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
directory=/opt/dataspark
user=ubuntu
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/dataspark.log
environment=PATH="/opt/dataspark/venv/bin"